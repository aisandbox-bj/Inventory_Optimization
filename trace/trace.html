<!DOCTYPE html>
<!--═══ BUILD-STAMP ═══════════════════════════════════════════════════════
     Calibre Trace · v0.4-dev (left rail + scope machinery) · APP-T-04
     Repo : https://github.com/aisandbox-bj/Inventory_Optimization
     RoC  : ../record-of-change.html
     Reads canonical JSON from local storage (same source as Analysis).
     Left rail hosts SCOPE selector + VIEW list.
═════════════════════════════════════════════════════════════════════════-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Calibre Trace · Procurement Chain</title>
<meta name="app-version" content="2.1.3-dev" />
<link rel="stylesheet" href="../shared/brand-tokens.css" />
<link rel="stylesheet" href="../shared/trace-phase.css" />
<link rel="stylesheet" href="trace.css" />
</head>
<body>

<nav class="appnav">
  <div class="brand">
    <span class="dot"></span>
    Inventory Optimization
    <a class="sub active" href="../record-of-change.html" title="You are on Trace · v0.4-dev">v2.1.3-dev · Trace</a>
  </div>
  <div class="links">
    <a href="../index.html">Dashboard</a>
    <a href="../intake/intake.html">Intake</a>
    <a href="../analysis/analysis.html">Trend</a>
    <a href="trace.html" class="active">Trace</a>
    <a href="../screener/screener.html">Screener</a>
    <a href="../settings/settings.html">Settings</a>
    <a href="../record-of-change.html">RoC</a>
    <a href="../user-manual.html">Manual</a>
  </div>
</nav>

<main class="trace-shell" id="traceShell">

  <!-- ═════════════════ EMPTY-STATE OVERLAY (no intake / no PR History) ═════════════════ -->
  <section id="emptyState" class="empty-state hidden"></section>

  <!-- ═════════════════ LEFT RAIL · scope + views ═════════════════ -->
  <aside class="trace-rail" id="traceRail">

    <div class="rail-brand">
      <span class="rail-brand-dot"></span>
      <span class="rail-brand-name">Calibre Trace</span>
      <span class="rail-brand-ver">v0.4-dev</span>
    </div>

    <section class="rail-section rail-scope">
      <div class="rail-section-label">Scope</div>

      <div class="scope-mode" id="scopeMode">
        <label class="scope-mode-opt"><input type="radio" name="scopeModeRadio" value="single" checked> Single material</label>
        <label class="scope-mode-opt"><input type="radio" name="scopeModeRadio" value="multi"> Multi-material</label>
      </div>

      <!-- ─── SINGLE MATERIAL ─── -->
      <div class="scope-single" id="scopeSingle">
        <input type="text" id="matSearch" class="mat-search" placeholder="Search material or description…" autocomplete="off" />
        <div class="mat-list-compact" id="matListCompact"></div>
        <div class="scope-meta" id="scopeSingleMeta"></div>
      </div>

      <!-- ─── MULTI MATERIAL ─── -->
      <div class="scope-multi hidden" id="scopeMulti">
        <div class="multi-source">
          <button class="rail-btn" id="btnUseTuneList" title="Pull the material list from this assessment's manual scope (User List assessments only)">Use Tune's list</button>
          <button class="rail-btn" id="btnPasteList" title="Paste a material list, one per row">Paste list…</button>
          <div class="paste-zone hidden" id="pasteZone">
            <textarea id="pasteText" placeholder="One material per row — or comma / tab-delimited" rows="4" spellcheck="false"></textarea>
            <div class="paste-actions">
              <button class="rail-btn-sub" id="pasteApply">Apply</button>
              <button class="rail-btn-sub" id="pasteCancel">Cancel</button>
            </div>
          </div>
        </div>

        <div class="multi-filter">
          <div class="filter-label">Material group</div>
          <div class="filter-search-wrap">
            <input type="text" id="groupSearch" class="filter-search" placeholder="Filter groups…" autocomplete="off" />
          </div>
          <div class="filter-check-list" id="groupChecks"></div>
        </div>

        <div class="multi-filter">
          <div class="filter-label">Stock level</div>
          <select id="stockFilter" class="filter-select">
            <option value="any">Any</option>
            <option value="oos">Out of stock (SOH ≤ 0)</option>
            <option value="belowMin">Below MRP Min (V1)</option>
            <option value="belowSS">Below Safety Stock (PD)</option>
            <option value="aboveMax">Above MRP Max (V1)</option>
          </select>
        </div>

        <div class="scope-summary" id="scopeMultiSummary">No multi-material scope set yet.</div>
      </div>
    </section>

    <section class="rail-section rail-views">
      <div class="rail-section-label">Views</div>

      <!-- POST-T-04 PATCH (2026-05-17) — views no longer locked to a scope
           mode. Operator can click any view in any scope; queued views render
           the "not built yet" panel rather than refusing the click. -->
      <div class="view-group">
        <div class="view-group-label">Single material</div>
        <button class="view-btn active" data-view="procurement-chain">
          <span class="view-btn-marker">▶</span>
          <span class="view-btn-label">Procurement Chain</span>
        </button>
        <!-- APP-FIX-T-04b (2026-05-17) — Raw Data lifted from the
             Procurement Chain view into its own tab per operator request. -->
        <button class="view-btn" data-view="raw-data">
          <span class="view-btn-marker">▶</span>
          <span class="view-btn-label">Raw Data</span>
        </button>
        <button class="view-btn" data-view="phase-distribution" title="Box plots per phase A–E (mean line + whiskers to min/max, shared scale = average total lead time) + stats table">
          <span class="view-btn-marker">▶</span>
          <span class="view-btn-label">Phase Distribution</span>
        </button>
        <button class="view-btn" data-view="volume" title="Cumulative volume — PR raised / PO raised / Site receipt / Consumed + cancelled-PR ticks">
          <span class="view-btn-marker">▶</span>
          <span class="view-btn-label">Volume cumulative</span>
        </button>
        <button class="view-btn" data-view="year-on-year" title="Per-phase box plots compared year-on-year (e.g. 2025 vs 2026) with per-year change comments + shared-scale total-timeline chevrons">
          <span class="view-btn-marker">▶</span>
          <span class="view-btn-label">Year-on-Year</span>
        </button>
      </div>

      <div class="view-group">
        <div class="view-group-label">Multi-material</div>
        <button class="view-btn queued" data-view="internal-mom" title="Not built yet — click to learn more">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">Internal Process MoM</span>
        </button>
        <button class="view-btn queued" data-view="supplier-performance" title="Not built yet">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">Supplier Performance</span>
        </button>
        <button class="view-btn queued" data-view="three-pl" title="Not built yet">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">3PL Performance</span>
        </button>
        <button class="view-btn queued" data-view="cancellation" title="Not built yet">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">Cancellation Diagnostic</span>
        </button>
        <button class="view-btn queued" data-view="unit-cost" title="Not built yet">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">Unit-Cost Sensitivity</span>
        </button>
        <button class="view-btn queued" data-view="data-table" title="Not built yet">
          <span class="view-btn-marker">◌</span>
          <span class="view-btn-label">Data Table</span>
        </button>
      </div>
    </section>

    <div class="rail-foot">
      <span>Trace bridge · phase 3</span>
    </div>
  </aside>

  <!-- ═════════════════ CONTENT AREA · banner + active view ═════════════════ -->
  <section class="trace-content" id="traceContent">

    <header class="content-banner" id="contentBanner"></header>

    <div class="content-view" id="contentView">
      <!-- Renders the active view; defaults to Procurement Chain for the
           selected single material. trace.js owns the swap. -->
    </div>

  </section>

</main>

<!-- ─── Libraries (CDN) ─── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<!-- ─── App scripts ─── -->
<script src="../shared/canonical-schema.js"></script>
<script src="../shared/storage.js"></script>
<script src="../shared/locale.js"></script>
<!-- APP-Y-01 — pipeline (+ back-calc) so the context banner can show the same
     per-material stats (SOH · P2 rate · current MRP · last consumption) as Trend. -->
<script src="../shared/inventory-back-calc.js"></script>
<script src="../shared/pipeline.js"></script>
<script src="../shared/trace-phase.js"></script>
<script src="trace.js"></script>

</body>
</html>
